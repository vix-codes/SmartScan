name: smartscan
description: Offline-first document scanning application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+1
  google_mlkit_text_recognition: ^0.13.0
  path_provider: ^2.1.3
  path: ^1.9.0
  image: ^4.2.0
  ffi: ^2.1.2
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  encrypt: ^5.0.3
  local_auth: ^2.2.0
  cryptography: ^2.7.0
  workmanager: ^0.5.2
  archive: ^3.6.1
  xml: ^6.5.0
  uuid: ^4.5.1
  collection: ^1.18.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
